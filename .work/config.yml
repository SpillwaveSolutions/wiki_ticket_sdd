# Machine-readable settings. The agent file (CLAUDE.md / AGENTS.md) carries
# policy only -- see WORKLOG-SPEC section 4. Scripts read THIS file.
version: 1

project:
  key: PROJ
  name: "Acme Platform"

ticketing:
  system: github               # jira | ado | github | none
  # sync is skill-based (ticket-sync); no adapter binary
  project: SpillwaveSolutions/wiki_ticket_sdd

wiki:
  system: github-wiki          # confluence | github-wiki | ado-wiki | none
  # publishing is skill-based (wiki-publish); no adapter binary
  root_url: https://github.com/SpillwaveSolutions/wiki_ticket_sdd/wiki

paths:
  plans: docs/plans
  status: docs/status
  roadmap: docs/roadmap.md

status:
  default_kind: daily
  week_starts: monday
  timecard:
    include_hours: false       # spec §17 Q4 closed: narrative only; this knob is dead
    actor: rick
  publish: true

sync:
  active_window_days: 14
  conflict_policy: report      # report | local-wins | remote-wins
  push_on_capture: true

classifier:
  enabled: false             # OFF by default. Inline CLAUDE.md path handles the common case.
  min_confidence: 0.7        # below this, propose kind:triage + open question, never a confident kind
  debounce: stop             # fire on the Stop hook (end of response), not per user message

# NOT configurable: the body-size cap (section 8.3) is derived from PIPE_BUF,
# not chosen. It lives in code as a constant. A knob whose only valid value is
# the default is a trap.
